{% extends 'base.html' %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div style="text-align:center; padding: 8rem 2rem;">
    <i class="fas fa-exclamation-triangle" style="font-size:5rem; color:#ef4444; margin-bottom:2rem;"></i>
    <h1 style="font-size:3rem; margin-bottom:1rem;">500</h1>
    <p style="font-size:1.2rem; color:var(--text-muted); margin-bottom:2rem;">Something went wrong on our end. Please
        try again.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary" style="padding:0.75rem 2rem;">Go Home</a>
</div>
{% endblock %}
