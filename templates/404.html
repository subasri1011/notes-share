{% extends 'base.html' %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="text-align:center; padding: 8rem 2rem;">
    <i class="fas fa-ghost" style="font-size:5rem; color: var(--primary); margin-bottom:2rem;"></i>
    <h1 style="font-size:3rem; margin-bottom:1rem;">404</h1>
    <p style="font-size:1.2rem; color:var(--text-muted); margin-bottom:2rem;">This page doesn't exist or was moved.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary" style="padding:0.75rem 2rem;">Go Home</a>
</div>
{% endblock %}
